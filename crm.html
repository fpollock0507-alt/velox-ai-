<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Velox AI — Pipeline CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--bg2:#0c1020;--surface:#111827;--surface2:#1a2035;
  --border:rgba(99,179,255,0.1);--border2:rgba(99,179,255,0.2);
  --accent:#3b82f6;--accent2:#8b5cf6;--accent3:#06b6d4;
  --text:#f0f4ff;--muted:#7e8fb0;--muted2:#a8b4cc;
  --success:#34d399;--warn:#fbbf24;--danger:#f87171;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
  --col-pitched:#3b82f6;--col-replied:#f59e0b;--col-demo:#8b5cf6;--col-closed:#34d399;--col-lost:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}

/* Nav */
nav{position:sticky;top:0;z-index:100;padding:14px 28px;background:rgba(6,8,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo{font-size:17px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--muted2);font-family:var(--font);font-size:13px;padding:7px 14px;cursor:pointer;transition:all 0.2s;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-btn.primary{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;color:#fff;font-weight:500;}
.nav-btn.primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,246,0.3);}

/* Stats */
.stats-wrap{padding:24px 28px 0;position:relative;z-index:1;}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all 0.2s;}
.stat-box:hover,.stat-box.active{border-color:var(--border2);transform:translateY(-1px);}
.stat-box.active{background:var(--surface2);}
.stat-num{font-size:26px;font-weight:700;line-height:1;}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
.stat-bar{height:3px;border-radius:2px;margin-top:10px;opacity:0.6;}
.s-pitched .stat-num{color:var(--col-pitched);}
.s-pitched .stat-bar{background:var(--col-pitched);}
.s-replied .stat-num{color:var(--col-replied);}
.s-replied .stat-bar{background:var(--col-replied);}
.s-demo .stat-num{color:var(--col-demo);}
.s-demo .stat-bar{background:var(--col-demo);}
.s-closed .stat-num{color:var(--col-closed);}
.s-closed .stat-bar{background:var(--col-closed);}
.s-revenue .stat-num{color:var(--success);}
.s-revenue .stat-bar{background:var(--success);}

/* Kanban */
.kanban-wrap{padding:0 28px 40px;position:relative;z-index:1;overflow-x:auto;}
.kanban{display:grid;grid-template-columns:repeat(5,280px);gap:16px;min-width:max-content;padding-bottom:8px;}
.column{background:var(--surface);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;max-height:calc(100vh - 260px);}
.col-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.col-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
.col-dot{width:8px;height:8px;border-radius:50%;}
.col-count{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:2px 8px;color:var(--muted2);}
.col-cards{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.col-cards::-webkit-scrollbar{width:3px;}
.col-cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all 0.18s;animation:cardIn 0.25s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.card-name{font-size:14px;font-weight:600;margin-bottom:4px;}
.card-type{font-size:11px;color:var(--muted2);font-family:var(--mono);margin-bottom:10px;}
.card-meta{display:flex;flex-direction:column;gap:5px;}
.card-meta-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2);}
.card-meta-row svg{width:12px;height:12px;flex-shrink:0;opacity:0.6;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.card-date{font-size:11px;color:var(--muted);font-family:var(--mono);}
.card-value{font-size:12px;font-weight:600;color:var(--success);}
.card-follow-up{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono);}
.follow-overdue{background:rgba(248,113,113,0.12);color:var(--danger);border:1px solid rgba(248,113,113,0.2);}
.follow-today{background:rgba(251,191,36,0.12);color:var(--warn);border:1px solid rgba(251,191,36,0.2);}
.follow-soon{background:rgba(52,211,153,0.12);color:var(--success);border:1px solid rgba(52,211,153,0.2);}

/* Add card button */
.add-card-btn{margin:0 12px 12px;background:none;border:1px dashed var(--border2);border-radius:10px;color:var(--muted);font-family:var(--font);font-size:13px;padding:9px;cursor:pointer;transition:all 0.15s;width:calc(100% - 24px);}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,0.05);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;transform:scale(0.95);transition:transform 0.2s;}
.modal-overlay.open .modal{transform:scale(1);}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:16px;font-weight:600;}
.modal-close{background:var(--surface2);border:none;border-radius:8px;color:var(--muted2);width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.modal-close:hover{color:var(--danger);}
.modal-body{padding:24px;display:grid;gap:16px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface);}

/* Form elements */
.form-group{display:grid;gap:6px;}
.form-label{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
.form-input,.form-select,.form-textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;padding:10px 13px;outline:none;transition:border-color 0.2s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.55;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn{border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:500;padding:10px 20px;cursor:pointer;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);}
.btn-ghost{background:var(--surface2);color:var(--muted2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:rgba(248,113,113,0.12);color:var(--danger);border:1px solid rgba(248,113,113,0.25);}
.btn-danger:hover{background:rgba(248,113,113,0.2);}

/* Status pills */
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:20px;}
.pill-pitched{background:rgba(59,130,246,0.12);color:#60a5fa;border:1px solid rgba(59,130,246,0.2);}
.pill-replied{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.2);}
.pill-demo{background:rgba(139,92,246,0.12);color:#a78bfa;border:1px solid rgba(139,92,246,0.2);}
.pill-closed{background:rgba(52,211,153,0.12);color:#34d399;border:1px solid rgba(52,211,153,0.2);}
.pill-lost{background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.2);}

/* Notes */
.notes-list{display:grid;gap:8px;}
.note-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.note-text{font-size:13px;color:var(--muted2);line-height:1.55;}
.note-time{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px;}

/* Move buttons */
.move-row{display:flex;gap:6px;flex-wrap:wrap;}
.move-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-size:11px;font-family:var(--mono);padding:5px 10px;cursor:pointer;transition:all 0.15s;}
.move-btn:hover{border-color:var(--accent);color:var(--accent);}
.move-btn.current{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,0.1);}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface);border:1px solid var(--success);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--success);opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;font-family:var(--mono);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:768px){
  nav{padding:12px 16px;}
  .stats-wrap{padding:16px 16px 0;}
  .stats-row{grid-template-columns:repeat(3,1fr);}
  .kanban-wrap{padding:0 16px 32px;}
}
</style>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const COLS = [
  { id:'pitched', label:'Pitched', color:'var(--col-pitched)' },
  { id:'replied', label:'Replied', color:'var(--col-replied)' },
  { id:'demo',    label:'Demo Booked', color:'var(--col-demo)' },
  { id:'closed',  label:'Client Won', color:'var(--col-closed)' },
  { id:'lost',    label:'Not Interested', color:'var(--col-lost)' }
];

let prospects = JSON.parse(localStorage.getItem('velox_crm') || '[]');
let editingId = null;

// Seed with example data if empty
if (prospects.length === 0) {
  prospects = [
    { id:'1', name:'Bondi Physio & Rehab', type:'Physiotherapist', suburb:'Bondi', phone:'02 9365 1234', contact:'Sarah Mitchell', status:'replied', value:499, channel:'Instagram DM', notes:[{text:'Replied asking for more info. Seems keen. Follow up with demo video.',time:'Today 2:30pm'}], followUp: tomorrow(), createdAt: today() },
    { id:'2', name:'Castle Hill Plumbing Co', type:'Plumber', suburb:'Castle Hill', phone:'02 9894 5678', contact:'Dave Harris', status:'pitched', value:499, channel:'Facebook', notes:[], followUp: inDays(3), createdAt: today() },
    { id:'3', name:'Newtown Espresso Bar', type:'Café', suburb:'Newtown', phone:'02 9557 2345', contact:'Emma Chen', status:'demo', value:499, channel:'Email', notes:[{text:'Demo booked for Friday 2pm. They want to see it with their actual menu.',time:'Yesterday 4pm'}], followUp: inDays(2), createdAt: yesterday() },
    { id:'4', name:'Parramatta Dental Group', type:'Dentist', suburb:'Parramatta', phone:'02 9891 3456', contact:'Dr. James Park', status:'closed', value:499, channel:'Cold call', notes:[{text:'Signed up! First payment received. Deploying chatbot this week.',time:'2 days ago'}], followUp: null, createdAt: inDays(-5) },
  ];
  save();
}

function today(){ return new Date().toISOString().split('T')[0]; }
function yesterday(){ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; }
function tomorrow(){ const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; }
function inDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }

function save(){ localStorage.setItem('velox_crm', JSON.stringify(prospects)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).substr(2); }

function getFollowUpClass(date) {
  if (!date) return '';
  const d = new Date(date); const now = new Date();
  const diff = Math.floor((d-now)/(1000*60*60*24));
  if (diff < 0) return 'follow-overdue';
  if (diff === 0) return 'follow-today';
  return 'follow-soon';
}

function getFollowUpLabel(date) {
  if (!date) return '';
  const d = new Date(date); const now = new Date();
  const diff = Math.floor((d-now)/(1000*60*60*24));
  if (diff < 0) return `${Math.abs(diff)}d overdue`;
  if (diff === 0) return 'Follow up today';
  if (diff === 1) return 'Follow up tomorrow';
  return `Follow up in ${diff}d`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const kanban = document.getElementById('kanban');
  kanban.innerHTML = COLS.map(col => {
    const cards = prospects.filter(p => p.status === col.id);
    return `
      <div class="column">
        <div class="col-header">
          <div class="col-title">
            <div class="col-dot" style="background:${col.color}"></div>
            ${col.label}
          </div>
          <div class="col-count">${cards.length}</div>
        </div>
        <div class="col-cards" id="col-${col.id}">
          ${cards.map(card => renderCard(card)).join('')}
        </div>
        <button class="add-card-btn" onclick="openAddModal('${col.id}')">+ Add</button>
      </div>
    `;
  }).join('');

  updateStats();
}

function renderCard(p) {
  const fuClass = getFollowUpClass(p.followUp);
  const fuLabel = getFollowUpLabel(p.followUp);
  return `
    <div class="card" onclick="openEditModal('${p.id}')">
      <div class="card-name">${p.name}</div>
      <div class="card-type">${p.type} · ${p.suburb}</div>
      <div class="card-meta">
        ${p.contact ? `<div class="card-meta-row"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>${p.contact}</div>` : ''}
        ${p.channel ? `<div class="card-meta-row"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>${p.channel}</div>` : ''}
      </div>
      <div class="card-footer">
        <div class="card-date">${formatDate(p.createdAt)}</div>
        ${fuLabel ? `<div class="card-follow-up ${fuClass}">${fuLabel}</div>` : `<div class="card-value">$${p.value || 499}</div>`}
      </div>
    </div>
  `;
}

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return date.toLocaleDateString('en-AU', {day:'numeric',month:'short'});
}

function updateStats() {
  ['pitched','replied','demo','closed'].forEach(s => {
    document.getElementById(`stat-${s}`).textContent = prospects.filter(p=>p.status===s).length;
  });
  const rev = prospects.filter(p=>p.status==='closed').reduce((a,p)=>a+(p.value||499),0);
  document.getElementById('stat-revenue').textContent = `$${rev.toLocaleString()}`;
}

// ── Modals ───────────────────────────────────────────────────────────────────
function openAddModal(status = 'pitched') {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add prospect';
  document.getElementById('modalBody').innerHTML = prospectForm({ status });
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveProspect()">Add prospect</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(id) {
  editingId = id;
  const p = prospects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalBody').innerHTML = prospectForm(p) + notesSection(p);
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-danger" onclick="deleteProspect('${id}')">Delete</button>
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveProspect()">Save changes</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function prospectForm(p = {}) {
  return `
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Business name *</label>
        <input class="form-input" id="f-name" value="${p.name||''}" placeholder="e.g. Bondi Physio"/>
      </div>
      <div class="form-group">
        <label class="form-label">Business type</label>
        <input class="form-input" id="f-type" value="${p.type||''}" placeholder="e.g. Physiotherapist"/>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Suburb</label>
        <input class="form-input" id="f-suburb" value="${p.suburb||''}" placeholder="e.g. Bondi"/>
      </div>
      <div class="form-group">
        <label class="form-label">Contact name</label>
        <input class="form-input" id="f-contact" value="${p.contact||''}" placeholder="e.g. Sarah"/>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="f-phone" value="${p.phone||''}" placeholder="02 9000 0000"/>
      </div>
      <div class="form-group">
        <label class="form-label">Outreach channel</label>
        <select class="form-select" id="f-channel">
          ${['Instagram DM','Facebook','Email','Cold call','Referral','LinkedIn','Other'].map(c=>`<option ${p.channel===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="f-status">
          ${COLS.map(c=>`<option value="${c.id}" ${p.status===c.id?'selected':''}>${c.label}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Deal value ($)</label>
        <input class="form-input" id="f-value" type="number" value="${p.value||499}" placeholder="499"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Follow-up date</label>
      <input class="form-input" id="f-followup" type="date" value="${p.followUp||inDays(3)}"/>
    </div>
  `;
}

function notesSection(p) {
  return `
    <div style="border-top:1px solid var(--border);padding-top:16px;display:grid;gap:12px;">
      <div style="font-size:13px;font-weight:500;">📝 Notes</div>
      <div class="notes-list" id="notesList">
        ${(p.notes||[]).map(n=>`
          <div class="note-item">
            <div class="note-text">${n.text}</div>
            <div class="note-time">${n.time}</div>
          </div>
        `).join('') || '<div style="font-size:13px;color:var(--muted)">No notes yet</div>'}
      </div>
      <div style="display:flex;gap:8px;">
        <textarea class="form-textarea" id="f-note" placeholder="Add a note..." style="min-height:60px;flex:1"></textarea>
        <button class="btn btn-ghost" style="align-self:flex-end;white-space:nowrap" onclick="addNote('${p.id}')">Add note</button>
      </div>
      <div style="display:grid;gap:6px;">
        <div class="form-label">Move to stage</div>
        <div class="move-row">
          ${COLS.map(c=>`<button class="move-btn ${p.status===c.id?'current':''}" onclick="moveCard('${p.id}','${c.id}')">${c.label}</button>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function addNote(id) {
  const text = document.getElementById('f-note').value.trim();
  if (!text) return;
  const p = prospects.find(x => x.id === id);
  if (!p) return;
  if (!p.notes) p.notes = [];
  const now = new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  p.notes.unshift({ text, time: `Today ${now}` });
  save();
  document.getElementById('f-note').value = '';
  document.getElementById('notesList').innerHTML = p.notes.map(n=>`
    <div class="note-item">
      <div class="note-text">${n.text}</div>
      <div class="note-time">${n.time}</div>
    </div>
  `).join('');
  showToast('Note added');
  render();
}

function moveCard(id, status) {
  const p = prospects.find(x => x.id === id);
  if (!p) return;
  p.status = status;
  save(); render();
  closeModal();
  showToast(`Moved to ${COLS.find(c=>c.id===status).label}`);
}

function saveProspect() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').style.borderColor='var(--danger)'; return; }

  const data = {
    name,
    type: document.getElementById('f-type').value.trim(),
    suburb: document.getElementById('f-suburb').value.trim(),
    contact: document.getElementById('f-contact').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    channel: document.getElementById('f-channel').value,
    status: document.getElementById('f-status').value,
    value: parseInt(document.getElementById('f-value').value) || 499,
    followUp: document.getElementById('f-followup').value,
  };

  if (editingId) {
    const idx = prospects.findIndex(p => p.id === editingId);
    if (idx > -1) {
      prospects[idx] = { ...prospects[idx], ...data };
    }
    showToast('Prospect updated');
  } else {
    prospects.push({ id: uid(), notes: [], createdAt: today(), ...data });
    showToast('Prospect added!');
  }

  save(); render(); closeModal();
}

function deleteProspect(id) {
  if (!confirm('Delete this prospect?')) return;
  prospects = prospects.filter(p => p.id !== id);
  save(); render(); closeModal();
  showToast('Deleted');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── Export ───────────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['Name','Type','Suburb','Contact','Phone','Channel','Status','Value','Follow-up'];
  const rows = prospects.map(p => [
    `"${p.name}"`,`"${p.type||''}"`,`"${p.suburb||''}"`,
    `"${p.contact||''}"`,`"${p.phone||''}"`,`"${p.channel||''}"`,
    `"${p.status}"`,`"$${p.value||499}"`,`"${p.followUp||''}"`
  ]);
  const csv = [headers,...rows].map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='velox-pipeline.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('Pipeline exported!');
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✅ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function filterCol(col) {}

// Boot
render();
</script>
</body>
</html>
